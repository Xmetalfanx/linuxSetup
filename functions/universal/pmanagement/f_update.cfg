. $uniFunctionDir/pmanagement/f_updateDisplay.cfg
. $uniFunctionDir/pmanagement/f_updateChecks.cfg



# Updater for packages installed via the AUR
function aur_update() {
	clear
	fancy_message action "Starting check for AUR Helpers"

	run_if_exists yay -Syu --norebuild --nodiffmenu --upgrademenu --noeditmenu

	## these option valid ? 
	run_if_exists trizen -Syu --noconfirm --noedit

	fancy_message info "AUR Update Finished"
}
####################################################################
# start of functions, related to Ubuntu based distros

function update_kde_neon() {
	## Clears screen since update output seems messy (to me anyway)
	clear
	sudo pkcon update
	userPrompt
	fancy_message info "KDE Neon Updated"
	userPrompt
	clear
}

function update_linux_mint() {
	clear
	fancy_message info "Linux Mint Detected, updates will not be performed as you should use Mint's Graphial Updater to avoid issues"
	userPrompt

	return

}

# handles deb-get 
function update_deb_get() {
	clear 

	fancy_message action "Checking for deb-get support"
	if command -v deb-get >/dev/null; then
        
		fancy_message action "Resyncing/Updating deb-get"
		deb-get update
		userPrompt

		fancy_message action "Updating deb-get packages"
		deb-get upgrade 
		userPrompt
	else 
		fancy_message info "deb-get not detected"
		userPrompt
    fi
	
}

function update_debian_ubuntu_bases() {
	
	update_deb_get

	[ "$distroName" = "neon" ] && update_kde_neon && return 

	[ "$distroName" = "linuxMint" ] && update_linux_mint && return 

	# refreshes defeult repos and update
	refreshRepositories && $update

}

# End of debian/ubuntu based functions 
####################################################################

####################################################################
# Third party stuff that COULD BE on any distro 

function update_brew() {
	clear 

	fancy_message action "Checking for brew support"

	if command -v brew >/dev/null 2>&1; then
    	clear
		fancy_message info "brew detected"

		fancy_message action "Running Brew Update" && brew update
		fancy_message action "Running Brew Upgrade" && brew upgrade 
    else
        fancy_message info "brew not detected"
		userPrompt
    fi
	
}

function update_appimage_pm() {
	#ref: https://github.com/ivan-hc/AM
	
	clear
	fancy_message action "Checking for AppImage Package Manager support"

	# for am
    if command -v am >/dev/null 2>&1; then
        fancy_message info "AppImage Package Manager (am) detected"
        fancy_message action "Updating AppImage Package Manager"
        am update
    else
        fancy_message info "AppImage Package Manager (am) not detected"
    fi

	userPrompt 

	# for appman
    if command -v appman >/dev/null 2>&1; then
        fancy_message info "AppImage Package Manager (appman) detected"
        fancy_message action "Updating AppImage Package Manager"
        appman update
    else
        fancy_message info "AppImage Package Manager (appman) not detected"
    fi

	userPrompt
}


function third_party_source_updating() {
	clear 
	
	# for Flatpak
	run_if_exists flatpak update
	
	update_brew

 	update_appimage_pm
}

########################################################################################
## Meta function
function universal_update() {

	# Check for and if the right distro/distro base, displays message to user
		## I think my idea was to show a message about the last time the system was updated, and if it's been a 
		## while, maybe suggest updating?.. but ubuntu is listed?  same idea perhaps
	lastUpdateCheck

	rollingReleaseUpdateCheck

	case $distroBase in 

		arch) $update && aur_update && return ;;

		debian|ubuntu) update_debian_ubuntu_bases ;;

		*) 
			# refreshes defeult repos and update
			refreshRepositories && $update
			;;

	esac 

	userPrompt

	# Function call to log info
	logUpgradeInfo

	fancy_message info "System Up-to-date"
	userPrompt

	third_party_source_updating

}

