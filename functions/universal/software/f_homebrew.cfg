#########################################################################
# Related to Homebrews' install "itself"


# to set things up BEFORE installing Homebrew
function install_homebrew_dependencies() {

    fancy_message action "Installing Homebrew dependencies"
    case $distroBase in        
        debian|ubuntu)
            $refresh && sudo apt install -y build-essential curl git ruby ;;

		fedora)
    		sudo dnf group install -y "development-tools"
    		sudo dnf install -y curl git ruby ruby-devel libffi-devel bzip2 bzip2-devel zlib zlib-devel
    		;;

        opensuse)
            $refresh && sudo zypper install -y curl git ruby tar gzip bzip2 make gcc ;;
    esac 

    userPrompt

}

# to install Homebrew on Linux 
function install_homebrew() {
    # message about issues on tumbleweed related to run0 over sudo
    systemd_sudo_message
    
    # source: https://brew.sh/
    install_homebrew_dependencies

    fancy_message action "Installing Homebrew"
    userPrompt
    /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
    userPrompt

    # Some post install setup 
    post_homebrew_install_setup

    post_homebrew_install_message
}

# the generic post Homebrew install disclaimer
function post_homebrew_install_message() {
    fancy_message info "Homebrew has been installed. You can now use it to install packages."
    fancy_message info "To use Homebrew, you may need to run 'source ~/.bashrc' or restart your terminal."
    fancy_message info "Even if you installed software with Homebrew in these scripts, you may need to run 'source ~/.bashrc' to make it available in the current session. OR you could restart your terminal, and things should work as expected."
    userPrompt
}

# to run after the Homebrew install, itself
function post_homebrew_install_setup() {

    fancy_message action "Setting up Homebrew environment"

    if ! grep -q 'brew shellenv' "$HOME/.bashrc"; then
        echo "" >> "$HOME/.bashrc"
        echo 'eval "$(brew shellenv)"' >> "$HOME/.bashrc"
    fi

    eval "$(/home/linuxbrew/.linuxbrew/bin/brew shellenv 2>/dev/null || ~/.linuxbrew/bin/brew shellenv)"

    userPrompt
}

## End of the functions related to installing Homebrew itself 
#########################################################################


#########################################################################
## Functions related to installing Homebrew PACKAGES 


# Function used to install packages 
function install_homebrew_packages() {
    if [ ! -x "/home/linuxbrew/.linuxbrew/bin/brew" ] && [ ! -x "$HOME/.linuxbrew/bin/brew" ]; then
        # install Homebrew
        fancy_message warn "Homebrew not found. Installing Homebrew first."
        userPrompt
        install_homebrew
    fi

    fancy_message action "Installing ${1} via Homebrew"
    brew install "${1}"

    # Notify user they MAY have to restart their terminal or run 'source ~/.bashrc' to use the installed software
    # notify_homebrew_install
    post_homebrew_package_install_message

    userPrompt
}

# function to display message to user after a homebrew package is installed
function post_homebrew_package_install_message() {
    fancy_message lwarn "Homebrew tells you how to configure different things for whatever your current setup is, after a Homebrew software package is installed.  IF you do not follow those instructions, things may not work correctly."
    
    fancy_message info "Be sure to read and follow the instructions... possibly in another terminal window or tab"
}

## End of functions related to Homebrew package installs
