#########################################################################
## Functions related to the Homebrew Menus

homebrew_menu_items=(
    1 "['cat' alternative] bat"
    2 "['ls' alternative] eza"
    3 "['du'/'df' alternative] dust"
    4 "[Fuzzy Finder] fzf"
    5 "[Man Page summerizer] tlrc"
    6 "[Better Bash History tool] Atuin"
    7 "[Helps navigate your FS, easier] Zoxide"
	8 "[Terminal File Manager] yazi"
    9 "[Disk Usage Viewer] gdu"
	10 "[Man Page Summerizer] Qman"
	11 "[Shell Tool] Starship"
    I "Install Homebrew"
    M "Return to Main Menu"
    Q "Exit to Prompt"
)

function homebrewMenuCaseStatement() {
    case $homebrewSelection in
        1) install_homebrew_packages "bat" ;;
        2) install_homebrew_packages "eza" ;;
        3) install_homebrew_packages "dust" ;;
        4) install_homebrew_packages "fzf" ;;
        5) install_homebrew_packages "tlrc" ;;
        6) install_homebrew_packages "atuin" ;;
        7) install_homebrew_packages "zoxide" ;; 
        8) install_homebrew_packages "yazi" ;;
		9) install_homebrew_packages "gdu" ;;
		10) install_homebrew_packages "qman" ;; 
		11) install_homebrew_packages "starship" ;; 
        [iI]) install_homebrew ;;
        [sS]) mainSoftwareMenu ;;
        [mM]) mainMenuType ;;
        [qQ]) quitScript ;;
        *) invalidSection ;;
    esac
}

function homebrewMenuDialog() {
    createDialogMenu
}

function homebrewMenuEcho() {
    createEchoMenu
}

function homebrewSoftwareMenu() {
    baseMenuName="homebrewMenu"
    menuTitle="Xmetal Homebrew Software Menu"
    currentMenuCaseStatementName="homebrewMenuCaseStatement"

    declare -n menuArrayName=homebrew_menu_items
    declare -n currentMenuSelection=homebrewSelection

    $menuName
}

## End of functions related Homebrew Menus
