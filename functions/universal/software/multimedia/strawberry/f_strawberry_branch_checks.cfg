function strawberry_branch_distro_check() {

  case $distroBase in

    # ?? where is solus? 
    debian) getStrawberryURL && metaExternalDownload ${programTitle} ${programURL} ;;
    fedora) strawberry_fedora_branch_check ;;
    opensuse) strawberry_openSUSE_branch_check ;;
    ubuntu) strawberry_ubuntu_branch_check ;;

  esac


}
