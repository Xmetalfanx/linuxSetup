
function handle_strawberry_ubuntu_menu() {
  echo "How would you like to install Strawberry Media Player?"
  echo "1) Github release page"
  echo "2) Flatpak"
  echo "3) PPA"


  read -p "Enter your choice (1/2/3): " strawberry_choice
function installStrawberry() {
  
  case "$strawberry_choice" in
    1)  handle_strawberry_gitpage_download ;;
    2)
      # ref: https://flathub.org/en/apps/org.strawberrymusicplayer.strawberry
      installFlatpakApp ${strawberryFP}
      ;;
    3)
      echo "You chose PPA."
      installStrawberryPPA
      ;;
    *)
      echo "Invalid choice."
      ;;
  esac
}
    local programName="strawberry"
    local programTitle="Strawberry Media Player"
    local programHomepage="https://www.strawberrymusicplayer.org/"
    local strawberry_download="https://www.strawberrymusicplayer.org/#download"

    # for git?
    local repo="strawberrymusicplayer/strawberry"


    case $distroBase in 

        arch|solus) installApp "strawberry" ;;
        fedora|opensuse) 
            ext=".rpm"
            arch="x86_64"

            [ "${distro_base}" == "fedora" ] && branch="f${fedora_branch}"
            [ "${distro_base}" == "opensuse" ] && branch="lp${stripped_leap_branch}"
        ;; 

        debian|ubuntu) 
            ext=".deb"
            arch="amd64"
            
            [ "${distro_base}" == "debian" ] && branch="${debian_codename}"
            [ "${distro_base}" == "ubuntu" ] && branch="${ubuntu_codename}"
        ;;

    esac 

    #   local repo="$1"
    #   local ext="$2"
    #   local arch="$3"
    #   local branch="$4"
  gh_latest_asset "$repo" "$ext" "$arch" "$branch"
}