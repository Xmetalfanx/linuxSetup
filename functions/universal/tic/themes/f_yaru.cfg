#############################################################
# "meta" function for default repos
function yaruThemingDefaultRepos() {

  # yaru meta theme packages
  fancy_message action "Installing Yaru Meta packages"
  case $distroBase in
		opensuse)
			# only for Tumbleweed
			if [[ "$openSUSEBranch" == "tumbleweed" ]]; then
        $install metatheme-yaru-common gtk2-metatheme-yaru gtk3-metatheme-yaru gtk4-meta-theme-yaru || true
			fi
		;;

  esac

  fancy_message action "Installing Yaru gtk theming"
    case $distroBase in
      arch) aurAppInstall yaru-gtk-theme ;;
    esac

  fancy_message action "Installing Yaru Icons"
    case $distroBase in

      arch) aurAppInstall yaru-icon-theme ;;
      debian|ubuntu) $install yaru-theme-icon ;;
      opensuse|solus)
        # for TW only ? ... TODO: check that
        $install yaru-icon-theme
    esac

  # "Catch-all"
  case $distroBase in
    arch) aurAppInstall yaru-sound-theme ;;
    fedora) $install yaru-theme ;;
    debian|ubuntu) $install yaru-theme-sound yaru-theme-gtk ;;
  esac

}
