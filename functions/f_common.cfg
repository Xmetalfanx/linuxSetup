function systemd_sudo_message() {
	clear

	# bail out of function if the distro is not opensuse and the branch is not tumbleweed
	[[ ! ( "$distroBase" == "opensuse" && "$openSUSEBranch" == "tumbleweed" ) ]] && return

	fancy_message warn "ISSUE related to some distros using run0 from systemd, over the more traditional sudo"

	fancy_message info "From my testing alone, this causes Homebrew to not work via the official scripts.  Even when installed, this also causes am/appimage manager to get stuck in a loop asking for your password."

	fancy_message info "I will try to look/report this upstream, as my 3 year old, bare metal Tumbleweed install does not have this issue that i KNOW OF .... yet"

}
