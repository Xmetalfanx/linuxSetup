# checks if a command exists
function check_command_new() {
    command -v "$1" >/dev/null 2>&1
}

function run_if_exists() {
    local cmd="$1"
    shift

    fancy_message action "Checking for $cmd..."

    if command -v "$cmd" > /dev/null 2>&1; then
        fancy_message info "Updating $cmd"
        "$cmd" "$@"
    else
        fancy_message info "$cmd not found"
        userPrompt
    fi
}


# sliently exists 
## MAY not be the best one to use while debugging 
run_if_exists_silent() {
    local cmd="$1"
    shift

    fancy_message action "Checking for $cmd..."

    command -v "$cmd" >/dev/null 2>&1 || return 0

    "$cmd" "$@"
}

