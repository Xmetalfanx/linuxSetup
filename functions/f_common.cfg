##############################################################

# checks if a command exists 
function check_command() {
    local cmd="$1"
    local msg="$2"

    if ! command -v "$cmd" >/dev/null 2>&1; then
        echo "⚠️  $msg"
        userPrompt
        return 1    # signal failure
    fi
    return 0       # command exists
}

